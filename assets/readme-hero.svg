<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Pulley README hero</title>
  <desc id="desc">A quiet macOS menu bar pull request monitor shown as a pulley lifting review, CI, and merge queue signals into a focused menu bar panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070a"/>
      <stop offset="0.52" stop-color="#0a0f16"/>
      <stop offset="1" stop-color="#11151f"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#60a5fa" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#46a758" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#46a758" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ropeGrad" x1="84" y1="82" x2="700" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#dbeafe"/>
      <stop offset="0.42" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#46a758"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#151a24"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="96" y1="0" x2="458" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="0.58" stop-color="#c7dcff"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="softShadow" x="-18%" y="-18%" width="136%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0v46" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="460" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="460" rx="34" fill="url(#grid)"/>
  <circle cx="268" cy="104" r="230" fill="url(#blueGlow)"/>
  <circle cx="940" cy="380" r="270" fill="url(#greenGlow)"/>
  <rect x="1" y="1" width="1198" height="458" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.1"/>

  <g transform="translate(78 70)" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif">
    <text x="0" y="54" fill="url(#titleGrad)" font-size="60" font-weight="850" letter-spacing="-2.4">Pulley</text>
    <text x="2" y="91" fill="#b6beca" font-size="20" letter-spacing="0.1">Pull requests, quietly kept in motion.</text>

    <g transform="translate(0 142)" filter="url(#softShadow)">
      <rect width="324" height="166" rx="24" fill="#0d1117" stroke="#2b3544"/>
      <rect x="18" y="18" width="288" height="32" rx="16" fill="#141b27" stroke="#334155"/>
      <text x="34" y="40" fill="#e5edf8" font-size="14" font-weight="800">incoming PR signals</text>

      <g transform="translate(24 66)">
        <rect width="276" height="30" rx="15" fill="#0e1b13" stroke="#46a758" stroke-opacity="0.65"/>
        <circle cx="17" cy="15" r="9" fill="#14251a" stroke="#46a758"/>
        <path d="M12 15l4 4 7-9" fill="none" stroke="#7ee29a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="38" y="20" fill="#d9fbe2" font-size="13" font-weight="750">review approved</text>
      </g>

      <g transform="translate(24 104)">
        <rect width="276" height="30" rx="15" fill="#221606" stroke="#f0a000" stroke-opacity="0.7"/>
        <circle cx="17" cy="15" r="9" fill="#2b1b05" stroke="#f0a000"/>
        <text x="14" y="20" fill="#ffd166" font-size="15" font-weight="900">!</text>
        <text x="38" y="20" fill="#ffe6a3" font-size="13" font-weight="750">CI needs attention</text>
      </g>

      <g transform="translate(24 142)">
        <rect width="276" height="30" rx="15" fill="#0d1f35" stroke="#60a5fa" stroke-opacity="0.7"/>
        <circle cx="17" cy="15" r="9" fill="#0e243d" stroke="#60a5fa"/>
        <path d="M11 15h12M19 11l4 4-4 4" fill="none" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="38" y="20" fill="#dbeafe" font-size="13" font-weight="750">merge queue moving</text>
      </g>
    </g>
  </g>

  <g transform="translate(376 78)">
    <path d="M58 86C178 88 210 160 270 214C338 275 424 279 516 260" fill="none" stroke="#172033" stroke-width="19" stroke-linecap="round"/>
    <path d="M58 86C178 88 210 160 270 214C338 275 424 279 516 260" fill="none" stroke="url(#ropeGrad)" stroke-width="7" stroke-linecap="round"/>
    <path d="M58 244C166 222 212 194 270 214" fill="none" stroke="#172033" stroke-width="19" stroke-linecap="round"/>
    <path d="M58 244C166 222 212 194 270 214" fill="none" stroke="url(#ropeGrad)" stroke-width="7" stroke-linecap="round"/>
    <circle cx="58" cy="86" r="52" fill="#111827" stroke="#334155" stroke-width="2.5"/>
    <circle cx="58" cy="86" r="28" fill="#06080c" stroke="#93c5fd" stroke-width="4"/>
    <circle cx="58" cy="86" r="8" fill="#e5edf8"/>
    <circle cx="58" cy="244" r="36" fill="#101720" stroke="#334155" stroke-width="2"/>
    <circle cx="58" cy="244" r="16" fill="#05070a" stroke="#60a5fa" stroke-width="3"/>
    <circle cx="270" cy="214" r="10" fill="#60a5fa" stroke="#dbeafe" stroke-width="2"/>
    <circle cx="516" cy="260" r="10" fill="#46a758" stroke="#d9fbe2" stroke-width="2"/>
  </g>

  <g transform="translate(604 58)" filter="url(#softShadow)">
    <rect width="488" height="330" rx="28" fill="url(#panelGrad)" stroke="#313846"/>
    <rect x="1" y="1" width="486" height="50" rx="27" fill="#171d28"/>
    <circle cx="28" cy="26" r="5.5" fill="#e5484d"/>
    <circle cx="48" cy="26" r="5.5" fill="#f0a000"/>
    <circle cx="68" cy="26" r="5.5" fill="#46a758"/>
    <text x="96" y="32" fill="#f1f5f9" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif" font-size="16" font-weight="850">Pulley</text>
    <text x="372" y="32" fill="#a7b0be" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif" font-size="13" font-weight="650">synced now</text>

    <g transform="translate(26 72)" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif">
      <rect width="436" height="70" rx="18" fill="#101a14" stroke="#46a758" stroke-opacity="0.58"/>
      <rect width="5" height="70" rx="2.5" fill="#46a758"/>
      <circle cx="31" cy="35" r="15" fill="#14251a" stroke="#46a758"/>
      <path d="M23 35l6 6 12-15" fill="none" stroke="#7ee29a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="58" y="29" fill="#f1f5f9" font-size="16" font-weight="850">Ready to ship</text>
      <text x="58" y="51" fill="#b6beca" font-size="13.5">security-fix #842 cleared review and CI</text>
      <text x="374" y="42" fill="#d9fbe2" font-size="13" font-weight="850">ship</text>
    </g>

    <g transform="translate(26 158)" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif">
      <rect width="436" height="70" rx="18" fill="#211506" stroke="#f0a000" stroke-opacity="0.62"/>
      <rect width="5" height="70" rx="2.5" fill="#f0a000"/>
      <circle cx="31" cy="35" r="15" fill="#2b1b05" stroke="#f0a000"/>
      <text x="27" y="42" fill="#ffd166" font-size="22" font-weight="900">!</text>
      <text x="58" y="29" fill="#f1f5f9" font-size="16" font-weight="850">CI needs attention</text>
      <text x="58" y="51" fill="#c7c0b4" font-size="13.5">pipeline-check #856 is waiting on tests</text>
      <text x="366" y="42" fill="#ffe6a3" font-size="13" font-weight="850">watch</text>
    </g>

    <g transform="translate(26 244)" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif">
      <rect width="436" height="60" rx="18" fill="#101827" stroke="#60a5fa" stroke-opacity="0.6"/>
      <rect width="5" height="60" rx="2.5" fill="#60a5fa"/>
      <circle cx="31" cy="30" r="15" fill="#0e243d" stroke="#60a5fa"/>
      <path d="M22 30h18M34 23l7 7-7 7" fill="none" stroke="#bfdbfe" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="58" y="25" fill="#f1f5f9" font-size="16" font-weight="850">Merge queue</text>
      <text x="58" y="46" fill="#b6beca" font-size="13.5">release-train #861 is position 2</text>
      <text x="363" y="36" fill="#dbeafe" font-size="13" font-weight="850">queue</text>
    </g>
  </g>

  <g transform="translate(772 372)" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif" filter="url(#softShadow)">
    <rect width="300" height="52" rx="18" fill="#101319" stroke="#313846"/>
    <circle cx="29" cy="26" r="13" fill="#14251a" stroke="#46a758"/>
    <path d="M23 26l4 4 8-10" fill="none" stroke="#7ee29a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="52" y="23" fill="#f1f5f9" font-size="13.5" font-weight="850">quiet toast</text>
    <text x="52" y="39" fill="#a7b0be" font-size="12">only when momentum changes</text>
  </g>
</svg>
